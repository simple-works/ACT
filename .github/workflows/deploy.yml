name: Deploy to Homelab

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # --- ADD THIS STEP TO BRIDGE THE CLOUDFLARE TUNNEL ---
      - name: Install Cloudflare Client & Configure SSH Proxy
        run: |
          sudo mkdir -p /usr/local/bin
          sudo curl -L https://github.com/cloudflare/cloudflared/releases/latest/download/cloudflared-linux-amd64 -o /usr/local/bin/cloudflared
          sudo chmod +x /usr/local/bin/cloudflared
          mkdir -p ~/.ssh
          echo -e "Host *\n  ProxyCommand /usr/local/bin/cloudflared access ssh --hostname %h" >> ~/.ssh/config

      - name: Deploy to Homelab
        uses: appleboy/ssh-action@v1.2.1
        with:
          host: ${{ secrets.HOST }}
          username: ${{ secrets.USER }}
          key: ${{ secrets.SSH_KEY }}
          command_timeout: "20m"
          script: |
            APP_DIR="/home/${{ secrets.USER }}/ACT"
            REPO_URL="https://github.com/Comon-tech/ACT.git"
            REMOTE="origin"
            BRANCH="main"

            if [ ! -d "$APP_DIR" ]; then
              echo "Directory $APP_DIR does not exist. Creating and cloning..."
              mkdir -p "$APP_DIR"
              cd "$APP_DIR"
              git clone --depth 1 "$REPO_URL" .
              git checkout "$BRANCH"
            else
              cd "$APP_DIR"
              if [ ! -d ".git" ]; then
                echo "No git repo found, Re-cloning..."
                rm -rf *
                git clone --depth 1 "$REPO_URL" .
                git checkout "$BRANCH"
              else
                echo "Fetching and resetting..."
                git fetch "$REMOTE" "$BRANCH"
                git reset --hard "$REMOTE"/"$BRANCH"
              fi
            fi

            echo "Syncing dependencies with uv..."
            ~/.local/bin/uv sync

            echo "Restarting service..."
            sudo systemctl restart act-bot.service
            sleep 3
            sudo systemctl status act-bot.service --no-pager